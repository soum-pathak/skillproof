<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillProof — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --paper: #FAF7F0;
    --paper-dim: #F1ECDF;
    --ink: #1C2A3A;
    --ink-soft: #4A5A6B;
    --verify: #1F6B45;
    --rule: #D9D2BD;
    --bronze: #9C6B3E;
    --silver: #6E7580;
    --gold: #A9821F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
    padding: 48px 20px 80px;
  }
  .wrap { max-width: 600px; margin: 0 auto; }
  .mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--verify);
    text-transform: uppercase;
    margin-bottom: 24px;
    text-align: center;
  }

  header.profile-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 24px;
    margin: 0 auto 14px;
  }
  h1 {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0 0 6px;
  }
  .profile-tagline {
    color: var(--ink-soft);
    font-size: 14px;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 22px 0 0;
  }
  .stat .num {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 22px;
    display: block;
    text-align: center;
  }
  .stat .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 12px;
  }

  .result-list { display: flex; flex-direction: column; gap: 10px; }

  a.result-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--ink);
    transition: border-color 0.2s ease;
  }
  a.result-row:hover, a.result-row:focus-visible {
    border-color: var(--verify);
  }
  a.result-row:focus-visible { outline: 2px solid var(--verify); outline-offset: 2px; }

  .result-seal {
    flex: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px double currentColor;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
  }
  .result-seal.bronze { color: var(--bronze); }
  .result-seal.silver { color: var(--silver); }
  .result-seal.gold   { color: var(--gold); }
  .result-seal .score { font-size: 13px; font-weight: 600; }

  .result-body { flex: 1; min-width: 0; }
  .result-body .skill-name {
    font-weight: 600;
    font-size: 14.5px;
    margin: 0 0 2px;
  }
  .result-body .result-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }

  #status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    padding: 40px 0;
  }

  .empty-note {
    font-size: 14px;
    color: var(--ink-soft);
    text-align: center;
    padding: 24px 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="mark">● SkillProof — Verified Skill Protocol</p>
  <div id="content">
    <p id="status">Loading profile...</p>
  </div>
</div>

<script>
  // Anon (public) key — same client-side approach as signup.html. This page
  // only ever reads data (profiles + results), never writes any, which is
  // exactly what the "anyone can view profiles/results" policies allow.
  const SUPABASE_URL = "https://wiiwzubqkfulxwxypnoy.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpaXd6dWJxa2Z1bHh3eHlwbm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDQ1MjgsImV4cCI6MjA5Nzg4MDUyOH0.RcQABL7EYveEX3TVshZ2qGtIBs8jGrNWGyQYCxhnrSc";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const SKILL_LABELS = {
    "excel": "Excel / Spreadsheets",
    "written-english": "Professional Written English",
    "sql": "SQL"
  };

  function formatDate(isoString) {
    const d = new Date(isoString);
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function renderResults(results) {
    if (results.length === 0) {
      return '<p class="empty-note">No tests completed yet.</p>';
    }
    let html = '<div class="result-list">';
    results.forEach(r => {
      const tier = (r.tier || "Bronze").toLowerCase();
      const skillLabel = SKILL_LABELS[r.skill] || r.skill;
      html += `
        <a class="result-row" href="/result.html?id=${encodeURIComponent(r.id)}">
          <span class="result-seal ${tier}">
            <span class="score">${r.score}</span>
          </span>
          <span class="result-body">
            <p class="skill-name">${escapeHtml(skillLabel)}</p>
            <span class="result-meta">${escapeHtml(r.tier)} &middot; ${formatDate(r.created_at)}</span>
          </span>
        </a>
      `;
    });
    html += '</div>';
    return html;
  }

  function renderProfile(profile, results) {
    const initial = profile.username.charAt(0).toUpperCase();
    const totalTests = results.length;
    const avgScore = totalTests > 0
      ? Math.round(results.reduce((sum, r) => sum + r.score, 0) / totalTests)
      : 0;

    return `
      <header class="profile-header">
        <div class="avatar">${escapeHtml(initial)}</div>
        <h1>${escapeHtml(profile.username)}</h1>
        <p class="profile-tagline">SkillProof verified profile</p>
        <div class="stats-row">
          <div class="stat">
            <span class="num">${totalTests}</span>
            <span class="label">Tests taken</span>
          </div>
          <div class="stat">
            <span class="num">${totalTests > 0 ? avgScore : '—'}</span>
            <span class="label">Avg score</span>
          </div>
        </div>
      </header>

      <p class="eyebrow">Verified results</p>
      ${renderResults(results)}
    `;
  }

  async function loadProfile() {
    // IMPORTANT: even though vercel.json's rewrite is written as
    // "/profile.html?u=:username", that query string is only used
    // internally by Vercel to pick which file to serve — it does NOT
    // become part of the real, visible URL for a static HTML page like
    // this one. window.location still shows "/u/soumpathak" with no query
    // string at all. So we read the username from the PATH instead.
    //
    // We support both, for flexibility: the path-based form (the real
    // /u/username links people will actually visit) and the old query
    // form (useful if this file is ever opened directly as
    // profile.html?u=username while testing).
    let username = null;

    const pathMatch = window.location.pathname.match(/^\/u\/([^/]+)\/?$/);
    if (pathMatch) {
      username = decodeURIComponent(pathMatch[1]);
    } else {
      const params = new URLSearchParams(window.location.search);
      username = params.get('u');
    }

    const content = document.getElementById('content');

    if (!username) {
      content.innerHTML = '<p id="status">No username was provided in this link.</p>';
      return;
    }

    try {
      // Step 1: find the profile by username.
      const { data: profiles, error: profileError } = await supabaseClient
        .from('profiles')
        .select('id, username')
        .eq('username', username)
        .limit(1);

      if (profileError) throw profileError;
      if (!profiles || profiles.length === 0) {
        content.innerHTML = `<p id="status">No profile found for "${escapeHtml(username)}".</p>`;
        return;
      }
      const profile = profiles[0];

      // Step 2: fetch every result belonging to that profile's user_id,
      // newest first.
      const { data: results, error: resultsError } = await supabaseClient
        .from('results')
        .select('id, skill, score, tier, created_at')
        .eq('user_id', profile.id)
        .order('created_at', { ascending: false });

      if (resultsError) throw resultsError;

      content.innerHTML = renderProfile(profile, results || []);
    } catch (err) {
      console.error(err);
      content.innerHTML = '<p id="status">Could not load this profile right now. Please try again.</p>';
    }
  }

  loadProfile();
</script>
</body>
</html>
