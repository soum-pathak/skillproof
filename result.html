<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillProof — Verified Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #FAF7F0; --paper-dim: #F1ECDF; --ink: #1C2A3A; --ink-soft: #4A5A6B;
  --verify: #1F6B45; --rule: #D9D2BD; --bronze: #9C6B3E; --silver: #6E7580; --gold: #A9821F;
  --caution: #9C5A1F;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; line-height: 1.5; padding: 48px 20px 80px; }
.wrap { max-width: 600px; margin: 0 auto; }
.mark { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.12em; color: var(--verify); text-transform: uppercase; margin-bottom: 24px; text-align: center; }
.badge-card { background: #fff; border: 1px solid var(--rule); border-radius: 4px; padding: 36px 28px; text-align: center; }
.seal { width: 96px; height: 96px; border-radius: 50%; border: 3px double currentColor; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 18px; font-family: 'IBM Plex Mono', monospace; transform: rotate(-4deg); }
.seal.bronze { color: var(--bronze); }
.seal.silver { color: var(--silver); }
.seal.gold { color: var(--gold); }
.seal .tier-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
.seal .score { font-size: 24px; font-weight: 600; }
.badge-card h2 { font-family: 'Lora', serif; font-size: 22px; margin: 0 0 4px; }
.verified-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--verify); margin: 0 0 20px; }
.feedback { font-size: 14px; color: var(--ink-soft); text-align: left; background: var(--paper-dim); border-radius: 3px; padding: 14px 16px; margin-bottom: 18px; }
.authenticity-note {
  font-size: 12.5px;
  color: var(--caution);
  text-align: left;
  background: #FBF0E4;
  border-left: 3px solid var(--caution);
  border-radius: 3px;
  padding: 10px 14px;
  margin-bottom: 18px;
}
.cta { display: block; text-align: center; margin-top: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink); }
#status { text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <p class="mark">● SkillProof — Verified Skill Protocol</p>
  <div id="content"><p id="status">Loading result...</p></div>
  <a class="cta" href="/">Take the SkillProof test →</a>
</div>
<script>
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function skillLabel(skill) {
  if (skill === "excel") return "Excel / Spreadsheets";
  if (skill === "sql") return "SQL";
  return "Professional English";
}

// Builds the small, honest disclosure note shown when the saved
// authenticity_data indicates pasted content was used (either a confirmed
// paste event, or a large sudden text change inferred as a likely
// non-typed insert — see authenticity.js for how these are captured).
// Returns an empty string if there's nothing to flag, so the card looks
// exactly as it always has for a normally-typed submission.
function renderAuthenticityNote(authenticityData) {
  if (!authenticityData) return '';
  const pasted = !!authenticityData.pasteDetected;
  const suspected = !!authenticityData.suspectedInsertDetected;
  if (!pasted && !suspected) return '';

  return `
    <div class="authenticity-note">
      Note: pasted or inserted content was detected while this test was being completed. This is an automated signal, not a determination of dishonesty — it simply reflects how the answer was entered.
    </div>
  `;
}

async function loadResult() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const content = document.getElementById('content');

  if (!id) {
    content.innerHTML = '<p id="status">No result ID was provided in this link.</p>';
    return;
  }

  try {
    const res = await fetch(`/api/result?id=${encodeURIComponent(id)}`);
    if (!res.ok) throw new Error("Not found");
    const result = await res.json();
    const tier = (result.tier || "Bronze").toLowerCase();

    content.innerHTML = `
      <div class="badge-card">
        <div class="seal ${tier}">
          <span class="tier-label">${escapeHtml(result.tier)}</span>
          <span class="score">${result.score}</span>
        </div>
        <h2>${escapeHtml(result.name)}</h2>
        <p class="verified-tag">Verified by SkillProof — ${skillLabel(result.skill)}</p>
        ${renderAuthenticityNote(result.authenticity_data)}
        <div class="feedback">${escapeHtml(result.feedback)}</div>
      </div>
    `;
  } catch (err) {
    content.innerHTML = '<p id="status">This result could not be found. The link may be incorrect or the result may have been removed.</p>';
    console.error(err);
  }
}
loadResult();
</script>
</body>
</html>
